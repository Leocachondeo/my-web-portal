<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>CineStream PS4 - Privado y Automático</title>
    <style>
        :root { --primary: #E50914; --bg: #0A0A0A; --card-bg: #1A1A1A; --text: #F5F5F5; --vpn: #00FF99; --iptv: #FFA500; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 25px; overflow-y: auto; }
        
        header { border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }
        h1 { margin: 0; font-size: 2rem; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); flex-grow: 1; text-align: center; }
        
        .nav-btn { background: #222; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; border: 1px solid #444; font-weight: bold; font-size: 1rem; }
        .nav-btn.active { border-color: var(--primary); background: #333; box-shadow: 0 0 12px rgba(229, 9, 20, 0.5); }
        .nav-btn.sync { border-color: var(--vpn); color: var(--vpn); }

        .section-header { color: #FFD700; font-size: 1.6rem; margin: 30px 0 20px 0; border-left: 5px solid var(--primary); padding-left: 15px; text-transform: uppercase; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        
        .site-card { background: var(--card-bg); width: 260px; padding: 20px; border-radius: 12px; text-decoration: none; color: white; border: 3px solid transparent; text-align: center; display: flex; flex-direction: column; align-items: center; transition: 0.1s; cursor: pointer; }
        .site-card img { width: 80px; height: 80px; margin-bottom: 10px; }
        .site-card h2 { font-size: 1.2rem; margin: 10px 0; }
        .site-card.active { border-color: var(--primary); transform: scale(1.05); background: #222; box-shadow: 0 10px 25px rgba(229, 9, 20, 0.4); z-index: 10; }
        
        .credentials-box { background: #000; border: 1px solid #333; padding: 10px; margin-top: 10px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; display: none; text-align: left; width: 100%; color: var(--vpn); line-height: 1.4; }
        .active .credentials-box { display: block; }

        #config-msg { position: fixed; top: 90px; right: 30px; font-weight: bold; padding: 8px; border-radius: 5px; z-index: 100; font-size: 0.9rem; }
        .controls-hint { position: fixed; bottom: 20px; right: 30px; background: rgba(0,0,0,0.85); padding: 10px 25px; border-radius: 50px; border: 1px solid var(--primary); font-size: 0.9rem; }

        /* Modal Styles */
        #config-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 800px; }
        .modal-content h2 { color: var(--primary); margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 5px; font-size: 1.1rem; box-sizing: border-box; }
        .input-group input.focused { border-color: var(--primary); background: #222; outline: none; }
        .modal-actions { display: flex; gap: 20px; justify-content: center; margin-top: 25px; }
        .modal-btn { padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; border: 2px solid transparent; font-size: 1.1rem; }
        .modal-btn.save { background: var(--primary); color: white; }
        .modal-btn.cancel { background: #333; color: white; }
        .modal-btn.focused { border-color: white; transform: scale(1.05); }
    </style>
</head>
<body>
    <header>
        <a href="https://github.com/leocachondeo" class="nav-btn" id="btn-github" onclick="window.location.href=this.href; return false;">📁 MI GITHUB</a>
        <h1>CineStream PS4</h1>
        <button class="nav-btn sync" id="btn-sync" onclick="toggleModal(true)">⚙️ CONFIGURAR</button>
    </header>

    <div id="config-msg"></div>

    <div id="config-modal">
        <div class="modal-content">
            <h2>CONFIGURACIÓN PRIVADA</h2>
            <div class="input-group">
                <label>AllDebrid API Key</label>
                <input type="text" id="inp-debrid" placeholder="Tu API Key de AllDebrid">
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="input-group" style="flex: 1;">
                    <label>IPVanish User</label>
                    <input type="text" id="inp-vpn-user" placeholder="Email">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>IPVanish Pass</label>
                    <input type="text" id="inp-vpn-pass" placeholder="Password">
                </div>
            </div>
            <div class="input-group">
                <label>Xtream URL (IPTV)</label>
                <input type="text" id="inp-xtream-url" placeholder="http://servidor.com:8080">
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="input-group" style="flex: 1;">
                    <label>Xtream User</label>
                    <input type="text" id="inp-xtream-user">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Xtream Pass</label>
                    <input type="text" id="inp-xtream-pass">
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn save" id="btn-modal-save" onclick="saveConfig()">GUARDAR ✅</button>
                <button class="modal-btn cancel" id="btn-modal-cancel" onclick="toggleModal(false)">CANCELAR ❌</button>
            </div>
        </div>
    </div>
    
    <div class="section-header" style="color:var(--vpn); border-left-color:var(--vpn)">Seguridad y VPN (Privado)</div>
    <div class="container" id="vpn-container"></div>

    <div class="section-header" style="color:var(--iptv); border-left-color:var(--iptv)">IPTV Premium</div>
    <div class="container" id="iptv-container"></div>

    <div class="section-header">Cine y TV (Debrid)</div>
    <div class="container" id="debrid-container"></div>

    <div class="section-header">Webs Ligeras</div>
    <div class="container" id="web-container"></div>

    <div class="controls-hint"><b>Cruceta</b>: Navegar | <b>X</b>: Entrar | <b>Triángulo</b>: Borrar Datos</div>

    <script>
        let userConfig = JSON.parse(localStorage.getItem('cs_data')) || {
            alldebrid_api: "", ipvanish_user: "Sin datos", ipvanish_pass: "Sin datos",
            xtream_url: "", xtream_user: "", xtream_pass: ""
        };

        const sections = {
            vpn: [{ name: 'SOCKS5 Proxy Info', url: 'https://account.ipvanish.com/index.php?t=SOCKS5%20Proxy', icon: 'https://cdn-icons-png.flaticon.com/512/1006/1006526.png', isVpn: true }],
            iptv: [{ name: 'Xtream Player Web', url: 'http://webtv.iptvsmarters.com/', icon: 'https://cdn-icons-png.flaticon.com/512/3075/3075908.png', isIptv: true }],
            debrid: [
                { name: 'Debrid Media Manager', url: 'https://debridmediamanager.com/', icon: 'https://cdn-icons-png.flaticon.com/512/814/814587.png' },
                { name: 'AllDebrid Manager', url: 'https://alldebrid.com/magnets/', icon: 'https://cdn-icons-png.flaticon.com/512/777/777242.png' }
            ],
            web: [
                { name: 'Photocall TV', url: 'https://photocall.tv', icon: 'https://cdn-icons-png.flaticon.com/512/716/716429.png' },
                { name: 'HDFull .me', url: 'https://hdfull.me', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' },
                { name: 'Votark (FR)', url: 'https://votark.com', icon: 'https://cdn-icons-png.flaticon.com/512/197/197560.png' }
            ]
        };

        let currentSection = 'vpn', currentIndex = 0;
        let isModalOpen = false, modalFocusIndex = 0;
        const sectionOrder = ['github', 'sync', 'vpn', 'iptv', 'debrid', 'web'];
        const modalInputs = ['inp-debrid', 'inp-vpn-user', 'inp-vpn-pass', 'inp-xtream-url', 'inp-xtream-user', 'inp-xtream-pass', 'btn-modal-save', 'btn-modal-cancel'];

        function updateState() {
            const msg = document.getElementById('config-msg');
            if (userConfig.alldebrid_api) {
                msg.innerHTML = "MEMORIA: ACTIVADA ✅";
                msg.style.color = "#00FF99";
                if (userConfig.xtream_url) {
                    sections.iptv[0].url = `${userConfig.xtream_url.replace(/\/$/, "")}/webtv/?username=${userConfig.xtream_user}&password=${userConfig.xtream_pass}`;
                }
            } else {
                msg.innerHTML = "MEMORIA: VACÍA ⚠️";
                msg.style.color = "#E50914";
            }
            renderAll();
        }

        function renderAll() {
            document.getElementById('btn-github').className = (currentSection === 'github' ? 'nav-btn active' : 'nav-btn');
            document.getElementById('btn-sync').className = (currentSection === 'sync' ? 'nav-btn sync active' : 'nav-btn sync');

            ['vpn', 'iptv', 'debrid', 'web'].forEach(secId => {
                const container = document.getElementById(secId + '-container');
                container.innerHTML = '';
                sections[secId].forEach((site, index) => {
                    const card = document.createElement('div');
                    const isActive = (currentSection === secId && index === currentIndex);
                    card.className = 'site-card' + (isActive ? ' active' : '');
                    let content = `<img src="${site.icon}"><h2>${site.name}</h2>`;
                    if (site.isVpn) {
                        content += `<div class="credentials-box"><b>VPN PRIVADA:</b><br>USER: ${userConfig.ipvanish_user}<br>PASS: ${userConfig.ipvanish_pass}<br>PORT: 1080</div>`;
                    }
                    card.innerHTML = content;
                    card.onclick = () => { window.location.href = site.url; };
                    container.appendChild(card);
                });
            });
            const active = document.querySelector('.active');
            if (active && !isModalOpen) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function toggleModal(show) {
            isModalOpen = show;
            document.getElementById('config-modal').style.display = show ? 'flex' : 'none';
            if (show) {
                document.getElementById('inp-debrid').value = userConfig.alldebrid_api || "";
                document.getElementById('inp-vpn-user').value = userConfig.ipvanish_user || "";
                document.getElementById('inp-vpn-pass').value = userConfig.ipvanish_pass || "";
                document.getElementById('inp-xtream-url').value = userConfig.xtream_url || "";
                document.getElementById('inp-xtream-user').value = userConfig.xtream_user || "";
                document.getElementById('inp-xtream-pass').value = userConfig.xtream_pass || "";
                modalFocusIndex = 0;
                updateModalFocus();
            }
        }

        function updateModalFocus() {
            modalInputs.forEach((id, idx) => {
                const el = document.getElementById(id);
                if (idx === modalFocusIndex) {
                    el.classList.add('focused');
                    if (el.tagName === 'INPUT') el.focus();
                } else {
                    el.classList.remove('focused');
                }
            });
        }

        function saveConfig() {
            userConfig = {
                alldebrid_api: document.getElementById('inp-debrid').value,
                ipvanish_user: document.getElementById('inp-vpn-user').value,
                ipvanish_pass: document.getElementById('inp-vpn-pass').value,
                xtream_url: document.getElementById('inp-xtream-url').value,
                xtream_user: document.getElementById('inp-xtream-user').value,
                xtream_pass: document.getElementById('inp-xtream-pass').value
            };
            localStorage.setItem('cs_data', JSON.stringify(userConfig));
            toggleModal(false);
            updateState();
        }

        document.addEventListener('keydown', (e) => {
            const keyCode = e.keyCode || e.which;
            const isEnter = (keyCode === 13 || keyCode === 32 || keyCode === 0);

            if (isModalOpen) {
                if (keyCode === 40) { // Abajo
                    modalFocusIndex = Math.min(modalFocusIndex + 1, modalInputs.length - 1);
                    updateModalFocus();
                } else if (keyCode === 38) { // Arriba
                    modalFocusIndex = Math.max(modalFocusIndex - 1, 0);
                    updateModalFocus();
                } else if (isEnter) { // X
                    const activeId = modalInputs[modalFocusIndex];
                    if (activeId === 'btn-modal-save') saveConfig();
                    else if (activeId === 'btn-modal-cancel') toggleModal(false);
                } else if (keyCode === 27) { // Circle / Esc
                    toggleModal(false);
                }
                return;
            }

            const currentList = sections[currentSection] || [1];

            if (keyCode === 38222) { // Triángulo
                if(confirm("¿Borrar contraseñas de la memoria de la PS4?")) {
                    localStorage.removeItem('cs_data');
                    location.reload();
                }
            }

            if (keyCode === 39) { // Derecha
                if (currentSection === 'github') currentSection = 'sync';
                else if (currentSection === 'sync') { currentSection = 'vpn'; currentIndex = 0; }
                else currentIndex = (currentIndex + 1) % currentList.length;
            } 
            else if (keyCode === 37) { // Izquierda
                if (currentIndex > 0) currentIndex--;
                else if (currentSection === 'sync') currentSection = 'github';
                else if (currentSection !== 'github') { currentSection = 'sync'; }
            }
            else if (keyCode === 40) { // Abajo
                let idx = sectionOrder.indexOf(currentSection);
                if (idx < sectionOrder.length - 1) { currentSection = sectionOrder[idx + 1]; currentIndex = 0; }
            }
            else if (keyCode === 38) { // Arriba
                let idx = sectionOrder.indexOf(currentSection);
                if (idx > 0) { currentSection = sectionOrder[idx - 1]; currentIndex = 0; }
            }
            else if (isEnter) { // X
                if (currentSection === 'github') window.location.href = "https://github.com/leocachondeo";
                else if (currentSection === 'sync') toggleModal(true);
                else window.location.href = currentList[currentIndex].url;
            }
            renderAll();
        });

        updateState();
    </script>
</body>
</html>
