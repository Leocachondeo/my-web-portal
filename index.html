<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>CineStream PS4 - ULTIMATE</title>
    <style>
        :root { --primary: #E50914; --bg: #0A0A0A; --card-bg: #1A1A1A; --text: #F5F5F5; --stremio: #8E44AD; --debrid: #00CCFF; --iptv: #2ECC71; --vpn: #00FF99; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 40px; overflow-x: hidden; }
        header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 40px; text-align: center; }
        h1 { margin: 0; font-size: 3.5rem; text-transform: uppercase; letter-spacing: 8px; color: var(--primary); }
        .section-header { color: #FFD700; font-size: 2rem; margin: 50px 0 25px 0; border-left: 6px solid var(--primary); padding-left: 20px; text-transform: uppercase; }
        .container { display: flex; gap: 25px; flex-wrap: wrap; }
        .site-card { background: var(--card-bg); width: 280px; padding: 25px; border-radius: 15px; text-decoration: none; color: white; border: 3px solid transparent; text-align: center; display: flex; flex-direction: column; align-items: center; transition: 0.1s; cursor: pointer; }
        .site-card.active { border-color: var(--primary); transform: scale(1.1); background: #222; box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4); z-index: 10; }
        .site-card.stremio-card.active { border-color: var(--stremio); box-shadow: 0 15px 30px rgba(142, 68, 173, 0.5); }
        .site-card.debrid-card.active { border-color: var(--debrid); box-shadow: 0 15px 30px rgba(0, 204, 255, 0.5); }
        .site-card.vpn-card.active { border-color: var(--vpn); box-shadow: 0 15px 30px rgba(0, 255, 153, 0.5); }
        .site-card.pressed { background: var(--primary); transform: scale(0.95); }
        .site-card img { width: 110px; height: 110px; border-radius: 50%; margin-bottom: 15px; background: #333; pointer-events: none; }
        .controls-hint { position: fixed; bottom: 30px; right: 50px; background: rgba(0,0,0,0.8); padding: 15px 35px; border-radius: 50px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <header><h1>CineStream PS4</h1></header>
    
    <div class="section-header" style="color:var(--vpn); border-left-color:var(--vpn)">Seguridad y VPN (Francia)</div>
    <div class="container" id="vpn-container"></div>

    <div class="section-header" style="color:var(--stremio); border-left-color:var(--stremio)">Kodi / Stremio (Recomendado)</div>
    <div class="container" id="stremio-container"></div>

    <div class="section-header" style="color:var(--iptv); border-left-color:var(--iptv)">IPTV & Xtream Codes</div>
    <div class="container" id="iptv-container"></div>

    <div class="section-header" style="color:var(--debrid); border-left-color:var(--debrid)">AllDebrid Premium</div>
    <div class="container" id="debrid-container"></div>

    <div class="section-header">TV en Vivo / Cine Web</div>
    <div class="container" id="web-container"></div>

    <div class="controls-hint"><b>Cruceta</b>: Navegar | <b>Botón X</b>: Entrar</div>

    <script>
        const sections = {
            vpn: [
                { name: 'IPVanish Panel', url: 'https://account.ipvanish.com/', icon: 'https://cdn-icons-png.flaticon.com/512/2092/2092202.png' },
                { name: 'SOCKS5 Proxy Info', url: 'https://account.ipvanish.com/index.php?t=SOCKS5%20Proxy', icon: 'https://cdn-icons-png.flaticon.com/512/1006/1006526.png' }
            ],
            stremio: [
                { name: 'STREMIO WEB', url: 'https://web.stremio.com/', icon: 'https://www.stremio.com/website/stremio-logo-small.png' }
            ],
            iptv: [
                { name: 'Xtream Player Web', url: 'http://webtv.iptvsmarters.com/', icon: 'https://cdn-icons-png.flaticon.com/512/3075/3075908.png' },
                { name: 'IPTV M3U Player', url: 'https://jack-iptv.com/', icon: 'https://cdn-icons-png.flaticon.com/512/3075/3075908.png' }
            ],
            debrid: [
                { name: 'AllDebrid Magnets', url: 'https://alldebrid.com/magnets/', icon: 'https://cdn-icons-png.flaticon.com/512/814/814587.png' }
            ],
            web: [
                { name: 'Photocall TV', url: 'https://photocall.tv', icon: 'https://cdn-icons-png.flaticon.com/512/716/716429.png' },
                { name: 'HDFull', url: 'https://hdfull.me', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' },
                { name: 'Wawacity (FR)', url: 'https://wawacity.red', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' }
            ]
        };

        let currentSection = 'vpn', currentIndex = 0;
        const sectionOrder = ['vpn', 'stremio', 'iptv', 'debrid', 'web'];

        function renderAll() {
            sectionOrder.forEach(secId => {
                const container = document.getElementById(secId + '-container');
                container.innerHTML = '';
                sections[secId].forEach((site, index) => {
                    const card = document.createElement('div');
                    const isActive = (currentSection === secId && index === currentIndex);
                    card.className = 'site-card ' + secId + '-card' + (isActive ? ' active' : '');
                    card.innerHTML = `<img src="${site.icon}"><h2>${site.name}</h2>`;
                    card.onclick = () => { window.location.href = site.url; };
                    container.appendChild(card);
                });
            });
            const activeCard = document.querySelector('.active');
            if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.addEventListener('keydown', (e) => {
            const currentList = sections[currentSection];
            const keyCode = e.keyCode || e.which;
            if (keyCode === 39) currentIndex = (currentIndex + 1) % currentList.length;
            else if (keyCode === 37) currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
            else if (keyCode === 40) {
                let idx = sectionOrder.indexOf(currentSection);
                if (idx < sectionOrder.length - 1) { currentSection = sectionOrder[idx + 1]; currentIndex = 0; }
            } else if (keyCode === 38) {
                let idx = sectionOrder.indexOf(currentSection);
                if (idx > 0) { currentSection = sectionOrder[idx - 1]; currentIndex = 0; }
            } else if (keyCode === 13 || keyCode === 32 || keyCode === 0) {
                e.preventDefault();
                const activeCard = document.querySelector('.active');
                if (activeCard) {
                    activeCard.classList.add('pressed');
                    setTimeout(() => { window.location.href = currentList[currentIndex].url; }, 200);
                }
            }
            renderAll();
        });
        renderAll();
    </script>
</body>
</html>
