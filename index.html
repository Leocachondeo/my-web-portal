
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>CineStream PS4 - Essentials</title>
    <style>
        :root { 
            --primary: #E50914; --bg: #0A0A0A; --card-bg: #1A1A1A; --text: #F5F5F5; 
            --vpn: #00FF99; --stremio: #8E44AD; --debrid: #00CCFF;
            --cast: #FFD700; --sports: #2ECC71;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px 40px; overflow-y: auto; scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }
        header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; color: var(--primary); letter-spacing: 5px; }
        
        .nav-btn { background: #222; color: white; text-decoration: none; padding: 12px 30px; border-radius: 12px; border: 2px solid #444; font-weight: bold; font-size: 1.1rem; position: absolute; right: 40px; }
        .nav-btn.active { border-color: var(--primary); background: #333; box-shadow: 0 0 15px rgba(229, 9, 20, 0.6); }

        .section-header { color: #FFD700; font-size: 1.8rem; margin: 40px 0 20px 0; border-left: 6px solid var(--primary); padding-left: 15px; text-transform: uppercase; }
        .container { display: flex; gap: 25px; flex-wrap: wrap; padding-bottom: 15px; }
        
        .site-card { background: var(--card-bg); width: 300px; padding: 30px; border-radius: 20px; text-decoration: none; color: white; border: 4px solid transparent; text-align: center; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; transition: 0.1s; }
        .site-card img { width: 110px; height: 110px; margin-bottom: 20px; border-radius: 15px; background: #252525; padding: 10px; }
        .site-card h2 { font-size: 1.3rem; margin: 10px 0; font-weight: 600; }
        .site-card p { font-size: 0.9rem; color: #aaa; margin: 0; line-height: 1.4; }
        .site-card.active { border-color: var(--primary); transform: scale(1.05); background: #252525; box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4); z-index: 10; }
        
        .controls-hint { position: fixed; bottom: 30px; right: 40px; background: rgba(0,0,0,0.9); padding: 15px 35px; border-radius: 50px; border: 2px solid var(--primary); font-size: 1.1rem; z-index: 1000; }
    </style>
</head>
<body>
    <header>
        <h1>CineStream PS4</h1>
        <a href="https://github.com/leocachondeo" class="nav-btn" id="btn-github">📁 MI GITHUB</a>
    </header>

    <div class="section-header" style="color:var(--cast); border-left-color:var(--cast)">Casting (Enviar desde Móvil)</div>
    <div class="container" id="cast-container"></div>

    <div class="section-header" style="color:var(--stremio); border-left-color:var(--stremio)">Stremio & Debrid (Cine 4K)</div>
    <div class="container" id="debrid-container"></div>

    <div class="section-header" style="color:var(--sports); border-left-color:var(--sports)">Deportes en Directo</div>
    <div class="container" id="sports-container"></div>

    <div class="section-header">Cine & Series Web (Mirrors)</div>
    <div class="container" id="web-container"></div>

    <div class="section-header" style="color:var(--vpn); border-left-color:var(--vpn)">Seguridad & VPN</div>
    <div class="container" id="vpn-container"></div>

    <div style="height: 100px;"></div>
    <div class="controls-hint"><b>Cruceta</b>: Mover | <b>Botón X</b>: Entrar</div>

    <script>
        const sections = {
            cast: [
                { name: 'Web Video Caster', desc: 'Recibe vídeos desde la app de tu móvil', url: 'http://cast2tv.app', icon: 'https://cdn-icons-png.flaticon.com/512/2589/2589174.png' },
                { name: 'CastBrowser', desc: 'Alternativa rápida para casting', url: 'https://castb.cc', icon: 'https://cdn-icons-png.flaticon.com/512/3256/3256783.png' },
                { name: 'AirDroid Cast', desc: 'Espejo de pantalla en tiempo real', url: 'https://webcast.airdroid.com', icon: 'https://cdn-icons-png.flaticon.com/512/1006/1006526.png' }
            ],
            debrid: [
                { name: 'Stremio Web', desc: 'Todo el cine con Real-Debrid', url: 'https://web.stremio.com/', icon: 'https://www.stremio.com/website/stremio-logo-small.png' },
                { name: 'Debrid Media Manager', desc: 'Gestiona tu biblioteca Debrid', url: 'https://debridmediamanager.com/', icon: 'https://cdn-icons-png.flaticon.com/512/814/814587.png' },
                { name: 'AllDebrid Player', desc: 'Reproductor de enlaces directos', url: 'https://alldebrid.com/magnets/', icon: 'https://cdn-icons-png.flaticon.com/512/777/777242.png' }
            ],
            sports: [
                { name: 'Pirlo TV', desc: 'Fútbol y eventos deportivos', url: 'https://www.pirlotv.fr', icon: 'https://cdn-icons-png.flaticon.com/512/888/888846.png' },
                { name: 'RojaDirecta', desc: 'La agenda deportiva clásica', url: 'https://www.rojadirectatv.top', icon: 'https://cdn-icons-png.flaticon.com/512/888/888846.png' }
            ],
            web: [
                { name: 'HDFull Directorio', desc: 'Encuentra el mirror activo', url: 'https://dominioshdfull.com', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' },
                { name: 'Wawacity', desc: 'Cine y series multilingüe', url: 'https://wawacity.red', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' },
                { name: 'Photocall TV', desc: 'TDT y canales internacionales', url: 'https://photocall.tv', icon: 'https://cdn-icons-png.flaticon.com/512/716/716429.png' }
            ],
            vpn: [
                { name: 'IPVanish Panel', desc: 'Acceso a tu cuenta VPN', url: 'https://account.ipvanish.com/', icon: 'https://cdn-icons-png.flaticon.com/512/2092/2092202.png' },
                { name: 'SOCKS5 Info', desc: 'Datos para el proxy de PS4', url: 'https://account.ipvanish.com/index.php?t=SOCKS5%20Proxy', icon: 'https://cdn-icons-png.flaticon.com/512/1006/1006526.png' },
                { name: '1.1.1.1 DNS', desc: 'Salto de bloqueos regionales', url: 'https://1.1.1.1/', icon: 'https://cdn-icons-png.flaticon.com/512/3256/3256783.png' }
            ]
        };

        let currentSection = 'cast', currentIndex = 0;
        const sectionOrder = ['github', 'cast', 'debrid', 'sports', 'web', 'vpn'];

        function renderAll() {
            document.getElementById('btn-github').className = (currentSection === 'github' ? 'nav-btn active' : 'nav-btn');
            Object.keys(sections).forEach(secId => {
                const container = document.getElementById(secId + '-container');
                if (!container) return;
                container.innerHTML = '';
                sections[secId].forEach((site, index) => {
                    const card = document.createElement('div');
                    card.className = 'site-card' + (currentSection === secId && index === currentIndex ? ' active' : '');
                    card.innerHTML = `<img src="${site.icon}"><h2>${site.name}</h2><p>${site.desc}</p>`;
                    card.onclick = () => { window.location.href = site.url; };
                    container.appendChild(card);
                });
            });
            const active = document.querySelector('.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.addEventListener('keydown', (e) => {
            const keyCode = e.keyCode || e.which;
            const isEnter = (keyCode === 13 || keyCode === 32 || keyCode === 0);
            
            const currentList = sections[currentSection] || [];

            if (keyCode === 39) { // Derecha
                if (currentSection === 'github') { currentSection = 'cast'; currentIndex = 0; }
                else currentIndex = (currentIndex + 1) % currentList.length;
            } 
            else if (keyCode === 37) { // Izquierda
                if (currentIndex > 0) currentIndex--;
                else if (currentSection !== 'github') { currentSection = 'github'; }
            }
            else if (keyCode === 40) { // Abajo
                let idx = sectionOrder.indexOf(currentSection);
                if (idx < sectionOrder.length - 1) { currentSection = sectionOrder[idx + 1]; currentIndex = 0; }
            }
            else if (keyCode === 38) { // Arriba
                let idx = sectionOrder.indexOf(currentSection);
                if (idx > 0) { currentSection = sectionOrder[idx - 1]; currentIndex = 0; }
            }
            else if (isEnter) {
                if (currentSection === 'github') window.location.href = "https://github.com/leocachondeo";
                else if (currentList[currentIndex]) window.location.href = currentList[currentIndex].url;
            }
            renderAll();
        });

        renderAll();
    </script>
</body>
</html>
