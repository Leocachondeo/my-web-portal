
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>CineStream PS4 LIGHT (USB DEBUG)</title>
    <style>
        :root { --primary: #E50914; --bg: #0A0A0A; --card-bg: #1A1A1A; --text: #F5F5F5; --mobile: #27AE60; --debrid: #00CCFF; --vpn: #00FF99; --iptv: #FFA500; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 40px; overflow-y: auto; }
        header { border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 40px; text-align: center; }
        h1 { margin: 0; font-size: 3.5rem; text-transform: uppercase; letter-spacing: 8px; color: var(--primary); }
        .section-header { color: #FFD700; font-size: 2rem; margin: 50px 0 25px 0; border-left: 6px solid var(--primary); padding-left: 20px; text-transform: uppercase; }
        .container { display: flex; gap: 25px; flex-wrap: wrap; }
        .site-card { background: var(--card-bg); width: 320px; padding: 30px; border-radius: 15px; text-decoration: none; color: white; border: 3px solid transparent; text-align: center; display: flex; flex-direction: column; align-items: center; transition: 0.1s; cursor: pointer; }
        .site-card.active { border-color: var(--primary); transform: scale(1.05); background: #222; box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4); z-index: 10; }
        .site-card.vpn-card.active { border-color: var(--vpn); box-shadow: 0 15px 30px rgba(0, 255, 153, 0.5); }
        
        #usb-status { position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: 10px; font-weight: bold; background: #333; z-index: 1000; }
        .status-ok { color: var(--vpn); border: 2px solid var(--vpn); background: rgba(0,255,153,0.1) !important; }
        .status-error { color: var(--primary); border: 2px solid var(--primary); background: rgba(229,9,20,0.1) !important; }
        
        #debug-console { background: #000; color: #00FF00; padding: 15px; border-radius: 10px; margin-top: 20px; font-family: monospace; font-size: 14px; border: 1px solid #333; height: 150px; overflow-y: scroll; display: none; }
        
        .credentials-box { background: #222; border: 1px solid #444; padding: 15px; margin-top: 10px; border-radius: 10px; font-family: monospace; font-size: 1.2rem; display: none; }
        .active .credentials-box { display: block; color: #00FF99; }
        .controls-hint { position: fixed; bottom: 30px; right: 50px; background: rgba(0,0,0,0.8); padding: 15px 35px; border-radius: 50px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <div id="usb-status">Iniciando sistema...</div>
    <header><h1>CineStream PS4 LIGHT</h1></header>

    <div id="debug-console"></div>
    
    <div class="section-header" style="color:var(--vpn); border-left-color:var(--vpn)">Seguridad y VPN (Francia)</div>
    <div class="container" id="vpn-container"></div>

    <div class="section-header" style="color:var(--iptv); border-left-color:var(--iptv)">IPTV Premium (Xtream)</div>
    <div class="container" id="iptv-container"></div>

    <div class="section-header" style="color:var(--debrid); border-left-color:var(--debrid)">Debrid Cinema</div>
    <div class="container" id="debrid-container"></div>

    <div class="section-header" style="color:var(--mobile); border-left-color:var(--mobile)">Móvil (Web Video Caster)</div>
    <div class="container" id="mobile-container"></div>

    <div class="section-header">Webs de Cine</div>
    <div class="container" id="web-container"></div>

    <div class="controls-hint"><b>Triángulo</b>: Mostrar Consola | <b>Cruceta</b>: Navegar | <b>X</b>: Entrar</div>

    <script>
        const log = (msg) => {
            const console = document.getElementById('debug-console');
            console.innerHTML += `> ${msg}<br>`;
            console.scrollTop = console.scrollHeight;
            console.style.display = 'block';
        };

        let userConfig = {
            alldebrid_api: "",
            ipvanish_user: "Pendiente USB",
            ipvanish_pass: "Pendiente USB",
            xtream_url: "",
            xtream_user: "",
            xtream_pass: ""
        };

        const sections = {
            vpn: [
                { name: 'SOCKS5 Proxy Info', url: 'https://account.ipvanish.com/index.php?t=SOCKS5%20Proxy', icon: 'https://cdn-icons-png.flaticon.com/512/1006/1006526.png', isVpn: true }
            ],
            iptv: [
                { name: 'Xtream Player Web', url: 'http://webtv.iptvsmarters.com/', icon: 'https://cdn-icons-png.flaticon.com/512/3075/3075908.png', isIptv: true }
            ],
            debrid: [
                { name: 'Debrid Media Manager', url: 'https://debridmediamanager.com/', icon: 'https://cdn-icons-png.flaticon.com/512/814/814587.png' },
                { name: 'AllDebrid Manager', url: 'https://alldebrid.com/magnets/', icon: 'https://cdn-icons-png.flaticon.com/512/777/777242.png' }
            ],
            mobile: [
                { name: 'RECIBIR DESDE MÓVIL', url: 'http://webvideocaster.com/connect', icon: 'https://cdn-icons-png.flaticon.com/512/2589/2589174.png' }
            ],
            web: [
                { name: 'HDFull .me', url: 'https://hdfull.me', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' },
                { name: 'Votark (FR)', url: 'https://votark.com', icon: 'https://cdn-icons-png.flaticon.com/512/197/197560.png' },
                { name: 'Photocall TV', url: 'https://photocall.tv', icon: 'https://cdn-icons-png.flaticon.com/512/716/716429.png' }
            ]
        };

        let currentSection = 'vpn', currentIndex = 0;
        const sectionOrder = ['vpn', 'iptv', 'debrid', 'mobile', 'web'];

        function updateUrls() {
            if (userConfig.xtream_url) {
                sections.iptv[0].url = `${userConfig.xtream_url}/webtv/?username=${userConfig.xtream_user}&password=${userConfig.xtream_pass}`;
                log("URLs de IPTV actualizadas.");
            }
        }

        function renderAll() {
            sectionOrder.forEach(secId => {
                const container = document.getElementById(secId + '-container');
                if (!container) return;
                container.innerHTML = '';
                sections[secId].forEach((site, index) => {
                    const card = document.createElement('div');
                    const isActive = (currentSection === secId && index === currentIndex);
                    card.className = 'site-card ' + secId + '-card' + (isActive ? ' active' : '');
                    
                    let content = `<img src="${site.icon}"><h2>${site.name}</h2>`;
                    if (site.isVpn) {
                        content += `<div class="credentials-box">
                            USER: ${userConfig.ipvanish_user}<br>
                            PASS: ${userConfig.ipvanish_pass}<br>
                            PORT: 1080
                        </div>`;
                    }
                    card.innerHTML = content;
                    card.onclick = () => { window.location.href = site.url; };
                    container.appendChild(card);
                });
            });
            const activeCard = document.querySelector('.active');
            if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function tryLoadUSB() {
            log("Iniciando escaneo de USB...");
            // Rutas extendidas para PS4 (intentamos acceso local y vía host)
            const paths = [
                '/mnt/usb0/config.json', 
                '/mnt/usb1/config.json', 
                'file:///mnt/usb0/config.json',
                'file:///mnt/usb1/config.json',
                'config.json' // Mismo directorio que el HTML
            ];
            const statusEl = document.getElementById('usb-status');
            
            for (let path of paths) {
                log("Probando: " + path);
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        userConfig = await response.json();
                        log("¡ÉXITO! Datos cargados desde: " + path);
                        statusEl.innerText = "USB DETECTADO ✅";
                        statusEl.className = "status-ok";
                        updateUrls();
                        renderAll();
                        return;
                    }
                } catch (e) { log("Error/No existe: " + path); }
            }
            statusEl.innerText = "USB NO DETECTADO ❌";
            statusEl.className = "status-error";
            log("Fin del escaneo. Asegúrate de que el USB sea FAT32/exFAT.");
        }

        document.addEventListener('keydown', (e) => {
            const keyCode = e.keyCode || e.which;
            log("Tecla pulsada: " + keyCode);
            
            if (keyCode === 38222) { // Triángulo en algunos navegadores de PS4
                const console = document.getElementById('debug-console');
                console.style.display = console.style.display === 'none' ? 'block' : 'none';
            }

            const currentList = sections[currentSection];
            if (keyCode === 39) currentIndex = (currentIndex + 1) % currentList.length;
            else if (keyCode === 37) currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
            else if (keyCode === 40) {
                let idx = sectionOrder.indexOf(currentSection);
                if (idx < sectionOrder.length - 1) { currentSection = sectionOrder[idx + 1]; currentIndex = 0; }
            } else if (keyCode === 38) {
                let idx = sectionOrder.indexOf(currentSection);
                if (idx > 0) { currentSection = sectionOrder[idx - 1]; currentIndex = 0; }
            } else if (keyCode === 13 || keyCode === 32 || keyCode === 0) {
                window.location.href = currentList[currentIndex].url;
            }
            renderAll();
        });

        renderAll();
        // Retraso de 2 segundos para dar tiempo al sistema de montar el USB
        setTimeout(tryLoadUSB, 2000);
    </script>
</body>
</html>
