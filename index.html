<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>CineStream PS4 - Portal de Cine</title>
    <style>
        :root { --primary: #E50914; --bg: #0A0A0A; --card-bg: #1A1A1A; --text: #F5F5F5; --vpn: #00FF99; --iptv: #FFA500; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 25px; overflow-y: auto; }
        
        header { border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }
        h1 { margin: 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 4px; color: var(--primary); flex-grow: 1; text-align: center; }
        
        .nav-btn { background: #222; color: white; text-decoration: none; padding: 12px 25px; border-radius: 10px; border: 1px solid #444; font-weight: bold; font-size: 1.1rem; }
        .nav-btn.active { border-color: var(--primary); background: #333; box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }

        .section-header { color: #FFD700; font-size: 1.8rem; margin: 40px 0 20px 0; border-left: 6px solid var(--primary); padding-left: 18px; text-transform: uppercase; }
        .container { display: flex; gap: 22px; flex-wrap: wrap; }
        
        .site-card { background: var(--card-bg); width: 270px; padding: 25px; border-radius: 15px; text-decoration: none; color: white; border: 3px solid transparent; text-align: center; display: flex; flex-direction: column; align-items: center; transition: 0.1s; cursor: pointer; }
        .site-card img { width: 100px; height: 100px; margin-bottom: 15px; border-radius: 10px; }
        .site-card h2 { font-size: 1.3rem; margin: 10px 0; }
        .site-card.active { border-color: var(--primary); transform: scale(1.05); background: #222; box-shadow: 0 12px 25px rgba(229, 9, 20, 0.4); z-index: 10; }
        
        .controls-hint { position: fixed; bottom: 25px; right: 40px; background: rgba(0,0,0,0.85); padding: 12px 30px; border-radius: 50px; border: 1px solid var(--primary); font-size: 1rem; }
    </style>
</head>
<body>
    <header>
        <a href="https://github.com/leocachondeo" class="nav-btn" id="btn-github">📁 MI GITHUB</a>
        <h1>CineStream PS4</h1>
        <div style="width: 150px;"></div> <!-- Espaciador para centrar título -->
    </header>

    <div class="section-header" style="color:var(--vpn); border-left-color:var(--vpn)">Seguridad y VPN</div>
    <div class="container" id="vpn-container"></div>

    <div class="section-header" style="color:var(--iptv); border-left-color:var(--iptv)">IPTV Premium</div>
    <div class="container" id="iptv-container"></div>

    <div class="section-header">Cine y TV (Debrid)</div>
    <div class="container" id="debrid-container"></div>

    <div class="section-header">Webs Ligeras</div>
    <div class="container" id="web-container"></div>

    <div class="controls-hint"><b>Cruceta</b>: Navegar | <b>Botón X</b>: Entrar</div>

    <script>
        const sections = {
            vpn: [{ name: 'IPVanish Login', url: 'https://account.ipvanish.com/', icon: 'https://cdn-icons-png.flaticon.com/512/2092/2092202.png' }],
            iptv: [
                { name: 'Xtream Player Web', url: 'http://webtv.iptvsmarters.com/', icon: 'https://cdn-icons-png.flaticon.com/512/3075/3075908.png' },
                { name: 'Jack IPTV Player', url: 'https://jack-iptv.com/', icon: 'https://cdn-icons-png.flaticon.com/512/4430/4430541.png' }
            ],
            debrid: [
                { name: 'Debrid Media Manager', url: 'https://debridmediamanager.com/', icon: 'https://cdn-icons-png.flaticon.com/512/814/814587.png' },
                { name: 'AllDebrid Manager', url: 'https://alldebrid.com/magnets/', icon: 'https://cdn-icons-png.flaticon.com/512/777/777242.png' }
            ],
            web: [
                { name: 'Photocall TV', url: 'https://photocall.tv', icon: 'https://cdn-icons-png.flaticon.com/512/716/716429.png' },
                { name: 'HDFull .me', url: 'https://hdfull.me', icon: 'https://cdn-icons-png.flaticon.com/512/3163/3163508.png' },
                { name: 'Votark (FR)', url: 'https://votark.com', icon: 'https://cdn-icons-png.flaticon.com/512/197/197560.png' }
            ]
        };

        let currentSection = 'vpn', currentIndex = 0;
        const sectionOrder = ['github', 'vpn', 'iptv', 'debrid', 'web'];

        function renderAll() {
            document.getElementById('btn-github').className = (currentSection === 'github' ? 'nav-btn active' : 'nav-btn');

            ['vpn', 'iptv', 'debrid', 'web'].forEach(secId => {
                const container = document.getElementById(secId + '-container');
                container.innerHTML = '';
                sections[secId].forEach((site, index) => {
                    const card = document.createElement('div');
                    const isActive = (currentSection === secId && index === currentIndex);
                    card.className = 'site-card' + (isActive ? ' active' : '');
                    card.innerHTML = `<img src="${site.icon}"><h2>${site.name}</h2>`;
                    card.onclick = () => { window.location.href = site.url; };
                    container.appendChild(card);
                });
            });
            const active = document.querySelector('.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.addEventListener('keydown', (e) => {
            const keyCode = e.keyCode || e.which;
            const isEnter = (keyCode === 13 || keyCode === 32 || keyCode === 0);
            const currentList = sections[currentSection] || [1];

            if (keyCode === 39) { // Derecha
                if (currentSection === 'github') currentSection = 'vpn';
                else currentIndex = (currentIndex + 1) % currentList.length;
            } 
            else if (keyCode === 37) { // Izquierda
                if (currentIndex > 0) currentIndex--;
                else if (currentSection !== 'github') currentSection = 'github';
            }
            else if (keyCode === 40) { // Abajo
                let idx = sectionOrder.indexOf(currentSection);
                if (idx < sectionOrder.length - 1) { currentSection = sectionOrder[idx + 1]; currentIndex = 0; }
            }
            else if (keyCode === 38) { // Arriba
                let idx = sectionOrder.indexOf(currentSection);
                if (idx > 0) { currentSection = sectionOrder[idx - 1]; currentIndex = 0; }
            }
            else if (isEnter) { // X
                if (currentSection === 'github') window.location.href = "https://github.com/leocachondeo";
                else window.location.href = currentList[currentIndex].url;
            }
            renderAll();
        });

        renderAll();
    </script>
</body>
</html>
